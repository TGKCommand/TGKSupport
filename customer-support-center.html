<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGK Motorsport Support</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
/* ============================================================
   BRANDING — matched to tgkmotorsport.com's live header/nav
   (dark navy header, teal wordmark, orange CTA) rather than the
   internal ERP's palette, so this drops into the storefront
   without looking like a different app.
   ============================================================ */
.tgk-support-center,.tgk-support-center *,.tgk-support-center *::before,.tgk-support-center *::after{box-sizing:border-box;margin:0;padding:0}
.tgk-support-center{
  --navy:#141b25;--navy2:#1c2531;
  --teal:#2dd4bf;--teal-d:#14b8a6;
  --orange:#ea580c;--orange-d:#c2410c;
  --bg:#ffffff;--bg2:#f7f8fa;--bg3:#f0f2f5;
  --border:#e2e6eb;--border2:#c8cdd5;
  --text:#111827;--text2:#374151;--text3:#6b7280;
  --red:#dc2626;--red-dim:rgba(220,38,38,.09);
  --green:#16a34a;--green-dim:rgba(22,163,74,.1);
  --yellow-dim:rgba(217,119,6,.1);--yellow-d:#b45309;
  --r:6px;--r-lg:10px;--font:'DM Sans',sans-serif;
  font-family:var(--font);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
.tgk-support-center h1,.tgk-support-center h2,.tgk-support-center p,.tgk-support-center ul{margin:0;padding:0}

.tgk-support-center .wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px}
.tgk-support-center .tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tgk-support-center .tab-btn{padding:11px 16px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:color .15s,border-color .15s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tgk-support-center .tab-btn:hover{color:var(--navy)}
.tgk-support-center .tab-btn.active{color:var(--navy);border-bottom-color:var(--orange);font-weight:700}
.tgk-support-center .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px 28px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
.tgk-support-center .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--orange) 60%,transparent)}
.tgk-support-center h1{font-size:20px;font-weight:800;margin-bottom:6px;color:var(--navy)}
.tgk-support-center h2{font-size:14.5px;font-weight:700;margin-bottom:10px;color:var(--navy)}
.tgk-support-center .sub{font-size:13px;color:var(--text3);margin-bottom:20px}
.tgk-support-center .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.tgk-support-center .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.tgk-support-center .form-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.tgk-support-center .form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:10px 12px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.tgk-support-center .form-input:focus{border-color:var(--teal)}
.tgk-support-center textarea.form-input{resize:vertical;min-height:100px}
.tgk-support-center .req{color:var(--red)}
.tgk-support-center .btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;font-size:13.5px;font-weight:700;border:none;border-radius:var(--r);background:var(--orange);color:#fff;cursor:pointer;transition:background-color .15s,box-shadow .15s,transform .1s;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.tgk-support-center .btn:hover{background:var(--orange-d);box-shadow:0 2px 6px rgba(0,0,0,.16);transform:translateY(-1px)}
.tgk-support-center .btn:active{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.12)}
.tgk-support-center .btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.tgk-support-center .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.tgk-support-center .btn-dark{background:var(--navy)}
.tgk-support-center .btn-dark:hover{background:#0d131b}
.tgk-support-center .callout{font-size:12.5px;border-radius:var(--r);padding:10px 12px;margin-bottom:18px;background:var(--yellow-dim);color:var(--yellow-d);font-weight:600}
.tgk-support-center .status-msg{font-size:12.5px;border-radius:var(--r);padding:10px 12px;margin-top:14px;display:none}
.tgk-support-center .status-msg.ok{display:block;background:var(--green-dim);color:var(--green)}
.tgk-support-center .status-msg.err{display:block;background:var(--red-dim);color:var(--red)}
.tgk-support-center .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.tgk-support-center .badge.open{background:rgba(37,99,235,.09);color:#2563eb}
.tgk-support-center .badge.pending,.tgk-support-center .badge.waiting_customer{background:var(--yellow-dim);color:var(--yellow-d)}
.tgk-support-center .badge.resolved,.tgk-support-center .badge.closed{background:var(--green-dim);color:var(--green)}
.tgk-support-center .order-item{border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.tgk-support-center .order-item .meta{font-size:11.5px;color:var(--text3)}
.tgk-support-center ul.plain{padding-left:18px;margin-top:6px}
.tgk-support-center ul.plain li{margin-bottom:6px;font-size:13px}
.tgk-support-center .footer-note{text-align:center;margin-top:6px;font-size:11px;color:var(--text3)}
.tgk-support-center .success{text-align:center;padding:20px 0}
.tgk-support-center .success .check{width:52px;height:52px;border-radius:50%;background:rgba(22,163,74,.12);color:#16a34a;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px}
.tgk-support-center .success h2{font-size:18px;margin-bottom:8px}
.tgk-support-center .success p{font-size:13.5px;color:var(--text3);line-height:1.6}
@media(max-width:600px){.tgk-support-center .form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="tgk-support-center">
  <div class="wrap">

<script>

  ⚠️ Same RLS caveat as before: this anon key is public in the
  browser by design. Safety comes entirely from Supabase RLS
  policies restricting anon access — insert-only on tickets/
  storage upload, no open SELECT/UPDATE/DELETE. Confirm those
  policies exist before this goes live.
============================================================ */
document.addEventListener('DOMContentLoaded', function(){
const SUPABASE_URL = "https://piamamighqiielfztgic.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpYW1hbWlnaHFpaWVsZnp0Z2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjkxMzUsImV4cCI6MjA5MzQ0NTEzNX0.YwLflTw6F4cRzmY78QoAY6Zud2IHGVP5xL_yvMFxheA";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------------- Shopify placeholders (unwired until Customer Account API is connected) ---------------- */
async function fetchShopifyOrders(customerAccessToken){
  // TODO: replace with a real call to the Shopify Customer Account API

  // fulfillment_status, tracking_number, tracking_url, financial_status, created_at, total}]
  console.warn('fetchShopifyOrders: not yet wired to Shopify Customer Account API');

const PAGES = ['track','history','return','contact','wholesale','warranty'];
const LABELS = {
  track:'Track My Order', history:'View Order History', return:'Submit a Return',
  contact:'Contact Us', wholesale:'Wholesale Information',
  warranty:'Returns and Warranty Information'
};

function renderTabs(active){
  document.getElementById('tabs').innerHTML = PAGES.map(p =>
    `<button class="tab-btn ${p===active?'active':''}" onclick="goPage('${p}')">${LABELS[p]}</button>`
  ).join('');
}
function goPage(p){
  renderTabs(p);
  document.getElementById('content').innerHTML = RENDER[p]();
  initSpamGuard(p);
  window.scrollTo(0,0);
}
window.goPage = goPage;

/* ---------------- Shared anti-spam block (honeypot + timing + math), same approach as tgk_ticket_form.html ---------------- */
const spamState = {};
function spamGuardHtml(prefix){
  return `
    <div style="position:absolute;left:-9999px;top:-9999px" aria-hidden="true">
      <label>Leave this field blank</label>
      <input type="text" id="${prefix}-website" tabindex="-1" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Quick check: what is <span id="${prefix}-mathLabel">?</span>? <span class="req">*</span></label>
      <input class="form-input" id="${prefix}-mathAnswer" type="number" inputmode="numeric">
    </div>`;
}
function initSpamGuard(prefix){
  const label = document.getElementById(`${prefix}-mathLabel`);
  if(!label) return;
  const a = Math.floor(Math.random()*8)+2, b = Math.floor(Math.random()*8)+2;
  label.textContent = `${a} + ${b}`;
  spamState[prefix] = { loadedAt: Date.now(), a, b };
}
function passesSpamGuard(prefix, errEl){
  const st = spamState[prefix];
  const honeypot = document.getElementById(`${prefix}-website`).value.trim();
  if(honeypot){ errEl.textContent = 'Something went wrong. Please try again.'; return false; }
  if(Date.now() - st.loadedAt < 2500){ errEl.textContent = 'Please take a moment to review the form before submitting.'; return false; }
  const answer = parseInt(document.getElementById(`${prefix}-mathAnswer`).value, 10);
  if(answer !== st.a + st.b){ errEl.textContent = 'That answer does not look right — please check the math question.'; return false; }
  return true;
}

/* ---------------- Shared attachment upload, same bucket/pattern as tgk_ticket_form.html ---------------- */
async function uploadAttachments(files){
  const attachments = [];
  for(const file of files){
    const path = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const { error: upErr } = await sb.storage.from('ticket-attachments').upload(path, file);
    if(upErr){ console.warn('Attachment upload failed:', upErr.message); continue; }
    const { data: pub } = sb.storage.from('ticket-attachments').getPublicUrl(path);
    attachments.push({ name: file.name, url: pub.publicUrl });
  }
  return attachments;
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const RENDER = {
  track: () => `
    <div class="card">
      <h1>Track My Order</h1>
      <p class="sub">Enter your order number and the email used at checkout.</p>
      <div class="form-row">

          <input class="form-input" id="trkOrder" placeholder="e.g. 10482"></div>
        <div class="form-group"><label class="form-label">Email</label>
          <input class="form-input" id="trkEmail" placeholder="you@example.com"></div>
      </div>
      <button class="btn" onclick="trackOrder()">Track Order</button>
      <div id="trkResult" style="margin-top:16px"></div>
      <p class="footer-note" style="text-align:left;margin-top:14px">Shipping/fulfillment data connects to Shopify order tracking. Any related support ticket on this order will also show here.</p>
    </div>`,

  history: () => `
    <div class="card">
      <h1>View Order History</h1>
      <p class="sub">Enter the email used at checkout to view your past orders.</p>
      <div class="form-group"><label class="form-label">Email</label>
        <input class="form-input" id="histEmail" placeholder="you@example.com"></div>
      <button class="btn" onclick="loadHistory()">View Orders</button>
      <div id="histResult" style="margin-top:16px"></div>
    </div>`,

  return: () => `
    <div class="card">
      <h1>Submit a Return</h1>
      <p class="sub">Tell us what's going on — our team reviews every return request manually and will follow up by email.</p>
      <div class="callout">All returns are subject to a 25% restocking fee, deducted from your refund.</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Name <span class="req">*</span></label>
          <input class="form-input" id="ret-name"></div>
        <div class="form-group"><label class="form-label">Email <span class="req">*</span></label>
          <input class="form-input" id="ret-email" type="email"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Order Number <span class="req">*</span></label>
          <input class="form-input" id="ret-order" placeholder="e.g. 10482"></div>
        <div class="form-group"><label class="form-label">Part Number</label>
          <input class="form-input" id="ret-pn" placeholder="If known"></div>
      </div>
      <div class="form-group"><label class="form-label">Reason for Return <span class="req">*</span></label>
        <textarea class="form-input" id="ret-message" placeholder="What's wrong, and what would you like — refund, replacement, exchange?"></textarea>
      </div>
      <div class="form-group"><label class="form-label">Photos (optional)</label>
        <input class="form-input" id="ret-files" type="file" multiple accept="image/*,.pdf"></div>
      ${spamGuardHtml('ret')}
      <div class="status-msg" id="ret-status"></div>
      <button class="btn" id="ret-submitBtn" onclick="submitReturn()">Submit Return Request</button>
    </div>`,

  contact: () => `
    <div class="card">
      <h1>Contact Us</h1>
      <p class="sub">General question, order issue, or anything else — a member of our team will follow up by email.</p>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Name <span class="req">*</span></label>
          <input class="form-input" id="ct-name"></div>
        <div class="form-group"><label class="form-label">Email <span class="req">*</span></label>
          <input class="form-input" id="ct-email" type="email"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Order Number</label>
          <input class="form-input" id="ct-order" placeholder="e.g. 10482"></div>
        <div class="form-group"><label class="form-label">Part Number</label>
          <input class="form-input" id="ct-pn" placeholder="If known"></div>
      </div>
      <div class="form-group"><label class="form-label">Subject <span class="req">*</span></label>
        <input class="form-input" id="ct-subject" placeholder="Brief summary of the issue"></div>
      <div class="form-group"><label class="form-label">Message <span class="req">*</span></label>
        <textarea class="form-input" id="ct-message" placeholder="Describe what's happening in as much detail as you can..."></textarea></div>
      <div class="form-group"><label class="form-label">Photos (optional)</label>
        <input class="form-input" id="ct-files" type="file" multiple accept="image/*,.pdf"></div>
      ${spamGuardHtml('ct')}
      <div class="status-msg" id="ct-status"></div>
      <button class="btn" id="ct-submitBtn" onclick="submitContact()">Submit Request</button>
    </div>`,

  wholesale: () => `
    <div class="card">
      <h1>Wholesale Information</h1>
      <p class="sub">Interested in carrying TGK products or ordering in bulk?</p>
      <ul class="plain"><li>Wholesale accounts get tiered pricing based on volume.</li></ul>
      <div class="form-row" style="margin-top:16px">
        <div class="form-group"><label class="form-label">Business Name <span class="req">*</span></label>
          <input class="form-input" id="ws-biz"></div>
        <div class="form-group"><label class="form-label">Business Email <span class="req">*</span></label>
          <input class="form-input" id="ws-email" type="email"></div>
      </div>
      ${spamGuardHtml('ws')}
      <div class="status-msg" id="ws-status"></div>
      <button class="btn" id="ws-submitBtn" onclick="submitWholesale()">Request Wholesale Info</button>
    </div>`,

  warranty: () => `
    <div class="card">
      <h1>Returns and Warranty Information</h1>
      <h2 style="margin-top:4px">Returns</h2>

        <li>All returns are subject to a <strong>25% restocking fee</strong>, deducted from your refund.</li>
        <li>Custom or special-order parts are final sale.</li>

      <h2 style="margin-top:16px">Warranty</h2>
      <ul class="plain"><li>Standard 1-year warranty against defects on most parts.</li></ul>

    </div>`
};

/* ---------------- Track / History ---------------- */
async function trackOrder(){
  const order = document.getElementById('trkOrder').value.trim();
  const email = document.getElementById('trkEmail').value.trim();
  const box = document.getElementById('trkResult');
  if(!order || !email){ box.innerHTML = '<div class="status-msg err" style="display:block">Enter both an order number and email.</div>'; return; }
  box.innerHTML = '<p class="sub">Looking up order…</p>';

  const shopifyOrders = await fetchShopifyOrders(null);
  const match = shopifyOrders.find(o => o.order_number === order || o.name === order);

  let ticketHtml = '';
  try{
    const { data: tickets } = await sb.from('tickets')
      .select('ticket_number,status,subject,created_at')
      .eq('order_number', order).ilike('customer_email', email)
      .order('created_at', { ascending:false }).limit(5);
    if(tickets && tickets.length){
      ticketHtml = `<h2 style="margin-top:18px">Related Support Tickets</h2>` + tickets.map(t => `
        <div class="order-item">
          <div><strong>#${t.ticket_number}</strong> — ${escapeHtml(t.subject||'')}</div>
          <span class="badge ${t.status}">${(t.status||'').replace(/_/g,' ')}</span>
        </div>`).join('');
    }
  }catch(e){ /* RLS may block anon select until policies are set — expected */ }

  box.innerHTML = (match
    ? `<div class="order-item"><div><strong>Order ${order}</strong><div class="meta">${match.fulfillment_status||'—'}</div></div>
        ${match.tracking_url ? `<a class="btn" href="${match.tracking_url}" target="_blank">Track Package</a>` : ''}</div>`
    : `<div class="status-msg err" style="display:block">Shopify order lookup isn't connected yet — needs the Customer Account API wired in (see code comments).</div>`
  ) + ticketHtml;
}
window.trackOrder = trackOrder;

async function loadHistory(){
  const email = document.getElementById('histEmail').value.trim();
  const box = document.getElementById('histResult');
  if(!email){ box.innerHTML = '<div class="status-msg err" style="display:block">Enter your email.</div>'; return; }
  box.innerHTML = '<p class="sub">Loading order history…</p>';
  const orders = await fetchShopifyOrders(null);
  if(!orders.length){
    box.innerHTML = '<div class="status-msg err" style="display:block">Shopify order history isn\'t connected yet — needs the Customer Account API wired in.</div>';
    return;
  }
  box.innerHTML = orders.map(o => `
    <div class="order-item">
      <div><strong>${o.name}</strong><div class="meta">${o.created_at||''} · $${o.total||''}</div></div>
      <span class="badge open">${o.fulfillment_status||o.financial_status||''}</span>
    </div>`).join('');
}
window.loadHistory = loadHistory;

/* ---------------- Submit a Return -> real Supabase ticket (matches tgk_ticket_form.html schema) ---------------- */
async function submitReturn(){
  const errEl = document.getElementById('ret-status');
  const btn = document.getElementById('ret-submitBtn');
  errEl.className = 'status-msg'; errEl.style.display='none'; errEl.textContent='';

  const name = document.getElementById('ret-name').value.trim();
  const email = document.getElementById('ret-email').value.trim();
  const order = document.getElementById('ret-order').value.trim();
  const pn = document.getElementById('ret-pn').value.trim();
  const message = document.getElementById('ret-message').value.trim();
  const files = Array.from(document.getElementById('ret-files').files||[]);

  if(!name || !email || !order || !message){
    errEl.className='status-msg err'; errEl.style.display='block'; errEl.textContent='Name, email, order number, and reason are required.'; return;
  }
  if(!passesSpamGuard('ret', errEl)){ errEl.className='status-msg err'; errEl.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Submitting...';
  try{
    const attachments = await uploadAttachments(files);
    const { data: ticket, error } = await sb.from('tickets').insert({
      source: 'website', status: 'open', priority: 'medium',
      subject: `Return request — order ${order}`,
      description: message,
      customer_name: name, customer_email: email,
      order_number: order, pn: pn || null,
      attachments, has_unread: true, unread_count: 1
    }).select().single();
    if(error) throw error;

    errEl.className = 'status-msg ok'; errEl.style.display='block';
    errEl.textContent = `Return request submitted (ticket #${ticket.ticket_number}). We'll follow up at ${email}.`;
    ['ret-name','ret-email','ret-order','ret-pn','ret-message'].forEach(id => document.getElementById(id).value='');
    btn.textContent = 'Submit Return Request'; btn.disabled = false;
  }catch(e){
    errEl.className = 'status-msg err'; errEl.style.display='block';
    errEl.textContent = 'Something went wrong: ' + (e.message||'unknown error');
    btn.textContent = 'Submit Return Request'; btn.disabled = false;
  }
}
window.submitReturn = submitReturn;

/* ---------------- Contact Us -> real Supabase ticket (matches tgk_ticket_form.html schema) ---------------- */
async function submitContact(){
  const errEl = document.getElementById('ct-status');
  const btn = document.getElementById('ct-submitBtn');
  errEl.className = 'status-msg'; errEl.style.display='none'; errEl.textContent='';

  const name = document.getElementById('ct-name').value.trim();
  const email = document.getElementById('ct-email').value.trim();
  const order = document.getElementById('ct-order').value.trim();
  const pn = document.getElementById('ct-pn').value.trim();
  const subject = document.getElementById('ct-subject').value.trim();
  const message = document.getElementById('ct-message').value.trim();
  const files = Array.from(document.getElementById('ct-files').files||[]);

  if(!name || !email || !subject || !message){
    errEl.className='status-msg err'; errEl.style.display='block'; errEl.textContent='Name, email, subject, and message are required.'; return;
  }
  if(!passesSpamGuard('ct', errEl)){ errEl.className='status-msg err'; errEl.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Submitting...';
  try{
    const attachments = await uploadAttachments(files);
    const { data: ticket, error } = await sb.from('tickets').insert({
      source: 'website', status: 'open', priority: 'medium',
      subject, description: message,
      customer_name: name, customer_email: email,
      order_number: order || null, pn: pn || null,
      attachments, has_unread: true, unread_count: 1
    }).select().single();
    if(error) throw error;

    errEl.className = 'status-msg ok'; errEl.style.display='block';
    errEl.textContent = `Request submitted (ticket #${ticket.ticket_number}). We'll follow up at ${email}.`;
    ['ct-name','ct-email','ct-order','ct-pn','ct-subject','ct-message'].forEach(id => document.getElementById(id).value='');
    btn.textContent = 'Submit Request'; btn.disabled = false;
  }catch(e){
    errEl.className = 'status-msg err'; errEl.style.display='block';
    errEl.textContent = 'Something went wrong: ' + (e.message||'unknown error');
    btn.textContent = 'Submit Request'; btn.disabled = false;
  }
}
window.submitContact = submitContact;

/* ---------------- Wholesale inquiry -> real Supabase ticket ---------------- */
async function submitWholesale(){
  const errEl = document.getElementById('ws-status');
  const btn = document.getElementById('ws-submitBtn');
  errEl.className = 'status-msg'; errEl.style.display='none'; errEl.textContent='';

  const biz = document.getElementById('ws-biz').value.trim();
  const email = document.getElementById('ws-email').value.trim();
  if(!biz || !email){
    errEl.className='status-msg err'; errEl.style.display='block'; errEl.textContent='Business name and email are required.'; return;
  }
  if(!passesSpamGuard('ws', errEl)){ errEl.className='status-msg err'; errEl.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Submitting...';
  try{
    const { data: ticket, error } = await sb.from('tickets').insert({
      source: 'website', status: 'open', priority: 'low',
      subject: `Wholesale inquiry — ${biz}`,
      description: `Wholesale information request from ${biz}.`,
      customer_name: biz, customer_email: email,
      has_unread: true, unread_count: 1
    }).select().single();
    if(error) throw error;

    errEl.className = 'status-msg ok'; errEl.style.display='block';
    errEl.textContent = `Request received (ticket #${ticket.ticket_number}). Our wholesale team will reach out at ${email}.`;
    ['ws-biz','ws-email'].forEach(id => document.getElementById(id).value='');
    btn.textContent = 'Request Wholesale Info'; btn.disabled = false;
  }catch(e){
    errEl.className = 'status-msg err'; errEl.style.display='block';
    errEl.textContent = 'Something went wrong: ' + (e.message||'unknown error');
    btn.textContent = 'Request Wholesale Info'; btn.disabled = false;
  }
}
window.submitWholesale = submitWholesale;

goPage('track');
});
