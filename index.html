<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f8fa;--bg3:#f0f2f5;--bg4:#e9ebee;--bg5:#dde0e5;
  --border:#e2e6eb;--border2:#c8cdd5;
  --text:#111827;--text2:#374151;--text3:#6b7280;
  --teal:#0d9488;--teal-d:#0f766e;--teal-dim:rgba(13,148,136,.09);
  --orange:#ea580c;--orange-d:#c2410c;--orange-dim:rgba(234,88,12,.09);
  --red:#dc2626;--red-dim:rgba(220,38,38,.09);
  --green:#16a34a;--green-dim:rgba(22,163,74,.09);
  --yellow:#d97706;--yellow-dim:rgba(217,119,6,.09);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.09);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,.09);
  --r:6px;--r-lg:10px;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-size:13px}
input,button,select,textarea{font-family:var(--font)}
.shell{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar-wrap{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow:hidden}
.sidebar{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:14px 16px 12px;border-bottom:1px solid var(--border);position:relative}
.sidebar-logo::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--orange) 60%,transparent)}
.sidebar-brand{font-size:11px;font-weight:800;color:var(--teal);letter-spacing:.18em;text-transform:uppercase}
.sidebar-brand small{display:block;font-size:15px;font-weight:700;color:var(--text);letter-spacing:0;text-transform:none;margin-top:2px}
.sidebar-section{padding:14px 14px 4px;font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);opacity:.85}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 8px;border-radius:8px;cursor:pointer;transition:all .12s;border:1px solid transparent;background:transparent;width:calc(100% - 16px);text-align:left;color:var(--text2);font-size:12.5px;font-weight:500;outline:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--teal-dim);color:var(--teal);border-color:rgba(13,148,136,.2)}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:all .15s}
.nav-item.active .nav-dot{background:var(--teal)}
.nav-badge{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);background:var(--bg4);border:1px solid var(--border);padding:1px 6px;border-radius:10px;min-width:22px;text-align:center;margin-left:auto}
.nav-item.active .nav-badge{color:var(--teal);background:var(--teal-dim);border-color:rgba(13,148,136,.22)}
.nav-item.alert-nav .nav-badge{color:var(--red);background:var(--red-dim);border-color:rgba(224,85,85,.25)}
.sidebar-footer{margin-top:auto;padding:10px 14px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sync-pill{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-label{font-size:11px;color:var(--text2);flex:1;font-weight:500}
.sync-sub{font-size:10px;color:var(--text3)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;z-index:10;position:relative}
.topbar::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--teal) 0%,var(--teal) 30%,var(--orange) 70%,transparent 100%);opacity:.7}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.01em}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:7px}
.content{flex:1;overflow-y:auto;overflow-x:auto;padding:20px 24px;position:relative}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:600;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:all .12s;letter-spacing:.01em}
.btn:hover{background:var(--bg5);color:var(--text);transform:translateY(-1px)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-primary{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-d);border-color:var(--orange-d)}
.btn-teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(13,148,136,.22)}
.btn-teal:hover{background:rgba(13,148,136,.13);border-color:rgba(13,148,136,.35)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Panels / KPIs */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.panel-title{font-size:10.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--text2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.kpi-grid{display:grid;gap:10px;margin-bottom:18px}
.kpi-grid-4{grid-template-columns:repeat(4,1fr)}
.kpi-grid-5{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px}
.kpi-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.kpi-value{font-size:24px;font-weight:600;line-height:1.1;font-family:var(--mono);margin-top:4px}
.kpi-sub{font-size:10.5px;color:var(--text3);margin-top:3px}
.kpi-orange .kpi-value{color:var(--orange)}
.kpi-red .kpi-value{color:var(--red)}
.kpi-teal .kpi-value{color:var(--teal)}

/* Table */
.tbl-wrap{overflow:visible;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--bg3);padding:10px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
tbody td{padding:10px 12px;color:var(--text2);vertical-align:middle;font-size:12.5px}
td.main-col{color:var(--text);font-weight:500}
.rowlink{cursor:pointer}
.rowlink:hover td{background:var(--teal-dim)!important}
.pn{font-family:var(--mono);font-size:12px;color:var(--text3)}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:2.5px 9px;font-size:10.5px;font-weight:600;border-radius:10px;border:1px solid transparent}
.pill-teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(13,148,136,.2)}
.pill-orange{background:var(--orange-dim);color:var(--orange);border-color:rgba(224,123,40,.2)}
.pill-red{background:var(--red-dim);color:var(--red);border-color:rgba(224,85,85,.2)}
.pill-green{background:var(--green-dim);color:var(--green);border-color:rgba(76,175,125,.2)}
.pill-yellow{background:var(--yellow-dim);color:var(--yellow);border-color:rgba(212,168,67,.2)}
.pill-muted{background:var(--bg4);color:var(--text3);border-color:var(--border)}
.src-tag{font-size:10.5px;color:var(--text3);border:1px solid var(--border);padding:2px 8px;border-radius:6px}

/* Filters */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:300px}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:12.5px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--teal)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:9px 11px;font-size:12.5px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--teal)}
select.form-input{cursor:pointer}

/* Modal / overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.14)}
.modal-title{font-size:14px;font-weight:700;margin-bottom:18px}
.form-row{display:grid;gap:10px;margin-bottom:12px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* Slide-over ticket panel (styled after the ERP's cart panel) */
#tk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:600;display:none}
#tk-overlay.open{display:block}
#tk-panel{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:96vw;background:var(--bg);border-left:1px solid var(--border2);z-index:601;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.12)}
#tk-panel.open{transform:translateX(0)}
.tk-head{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;background:var(--bg2)}
.tk-head-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.tk-close{background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px}
.tk-close:hover{background:var(--bg4);color:var(--text)}
.tk-body{flex:1;overflow-y:auto;padding:16px 18px}
#threadBox{max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-lg);padding:10px;background:var(--bg2)}
.tk-foot{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);display:flex;gap:8px}

.linked-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;margin:10px 0;font-size:12.5px;color:var(--text2)}
.linked-box .lk-title{font-weight:700;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}

.tabs-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

.msg{border-radius:var(--r-lg);padding:10px 13px;margin-bottom:8px;font-size:12.5px;line-height:1.5}
.msg.customer{background:var(--blue-dim)}
.msg.staff{background:var(--teal-dim)}
.msg.system{background:var(--bg3);color:var(--text3);font-style:italic}
.msg.note{background:var(--orange-dim);border:1px dashed var(--orange)}
.msg .meta{font-size:10.5px;color:var(--text3);margin-bottom:3px;display:flex;gap:6px;align-items:center;font-weight:600}
.checkbox-row{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text3);margin-top:6px}

#toast{position:fixed;bottom:20px;right:20px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:12.5px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.1)}
#toast.show{opacity:1}
#toast.err{border-color:rgba(220,38,38,.4);color:var(--red)}

.empty{text-align:center;padding:40px;color:var(--text3);font-size:12.5px}.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;opacity:.05}.watermark img{width:420px;height:auto}

/* Login gate */
#auth-gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
#auth-gate.hidden{display:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px;border:2px solid var(--bg2)}
</style>
</head>

<script>
/* ============================================================
   CONFIG — same Supabase project as the ERP
   ============================================================ */
const SUPABASE_URL = "https://piamamighqiielfztgic.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpYW1hbWlnaHFpaWVsZnp0Z2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjkxMzUsImV4cCI6MjA5MzQ0NTEzNX0.YwLflTw6F4cRzmY78QoAY6Zud2IHGVP5xL_yvMFxheA";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const IDLE_TIMEOUT_MS = 8 * 60 * 60 * 1000; // 8 hours, matches the ERP

/* ============================================================
   STATE
   ============================================================ */
const S = {
  user: null,
  role: 'customer_service',
  page: 'dashboard',
  tickets: [],
  messages: {},
  activityLog: {},
  selectedTickets: new Set(),
  warranty: [],
  shipErrors: [],
  dealers: [],
  team: [],
  activeTicket: null,
  filters: { status: 'open', priority: '', source: '', tag: '', assignedTo: '', staleOnly: false, showArchived: false, q: '' },
  lastActivity: Date.now()
};
window.S = S;

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function toast(msg, isErr){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('err', !!isErr);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 3200);
}
window.toast = toast;

function isUserActivelyWorking(){
  const ae = document.activeElement;
  if(!ae) return false;
  const tag = ae.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
}

document.addEventListener('mousemove', ()=> S.lastActivity = Date.now());
document.addEventListener('keydown', ()=> S.lastActivity = Date.now());
setInterval(()=>{
  if(Date.now() - S.lastActivity > IDLE_TIMEOUT_MS){
    sb.auth.signOut();
    location.reload();
  }
}, 60000);

/* ============================================================
   AUTH
   ============================================================ */
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if(!email || !pass){ errEl.textContent = 'Enter email and password.'; return; }
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if(error) throw error;
    await afterLogin(data.user);
  }catch(e){
    errEl.textContent = e.message || 'Login failed.';
  }
}
window.doLogin = doLogin;

async function doLogout(){
  await sb.auth.signOut();
  location.reload();
}
window.doLogout = doLogout;

async function afterLogin(user){
  S.user = user;
  let lookupError = null;
  let row = null;
  try{
    const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if(error) throw error;
    row = data;
  }catch(e){
    lookupError = e;
  }
  S.role = (row && row.role) ? row.role : null;

  if(!['admin','customer_service'].includes(S.role)){
    let msg = 'Your account does not have Support Center access.';
    if(lookupError){
      msg += ` (profiles lookup failed: ${lookupError.message})`;
      console.error('profiles lookup error:', lookupError);
    } else if(!row){
      msg += ` No profiles row found for user id ${user.id}.`;
    } else {
      msg += ` Role on file: "${row.role}".`;
    }
    document.getElementById('login-error').textContent = msg;
    console.log('Support Center access check — user:', user.email, 'row:', row, 'error:', lookupError);
    await sb.auth.signOut();
    return;
  }
  document.getElementById('auth-gate').classList.add('hidden');
  document.getElementById('tgk-app').style.display = 'block';
  document.getElementById('userLabel').textContent = user.email;
  await loadAll();
  renderNav();
  goPage('dashboard');
  subscribeRealtime();
}

(async function checkSession(){
  const { data } = await sb.auth.getSession();
  if(data && data.session){ await afterLogin(data.session.user); }
})();

/* ============================================================
   SSO — when opened inline inside the Command Center (as an iframe),
   accept the auth token it posts so staff don't have to log in twice.
   Same pattern as the ERP's own Command Center integration.

   Security note: this checks the message shape (source/type) but does
   NOT restrict which origin can send it. If you know the Command
   Center's exact hosted URL, tighten this by also checking
   event.origin === 'https://your-command-center-domain' below.
   ============================================================ */
window.addEventListener('message', async (event) => {
  if (!event.data || event.data.source !== 'TGK_CC' || event.data.type !== 'AUTH_TOKEN') return;
  try{
    const { error } = await sb.auth.setSession({
      access_token: event.data.access_token,
      refresh_token: event.data.refresh_token || ''
    });
    if(error){ console.error('SSO setSession failed:', error.message); return; }
    const { data: sessionData } = await sb.auth.getSession();
    if(sessionData?.session && !S.user){
      await afterLogin(sessionData.session.user);
    }
  }catch(e){
    console.error('SSO token accept failed:', e);
  }
});

/* ============================================================
   DATA LOADING
   ============================================================ */
async function fetchAll(queryFn, pageSize=1000){
  let all = [], from = 0;
  while(true){
    const { data, error } = await queryFn(from, from + pageSize - 1);
    if(error) throw error;
    all = all.concat(data || []);
    if(!data || data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

async function loadAll(){
  try{
    const [tickets, warranty, shipErrors, dealers, team] = await Promise.all([
      fetchAll((f,t)=> sb.from('tickets').select('*').order('created_at',{ascending:false}).range(f,t)),
      fetchAll((f,t)=> sb.from('warranty_claims').select('*').order('created_at',{ascending:false}).range(f,t)),
      fetchAll((f,t)=> sb.from('shipment_errors').select('*').order('created_at',{ascending:false}).range(f,t)),
      sb.from('dealers').select('id,name,email').then(r=>r.data||[]),
      sb.from('team_members').select('email,display_name').then(r=>r.data||[])
    ]);
    S.tickets = tickets;
    S.warranty = warranty;
    S.shipErrors = shipErrors;
    S.dealers = dealers;
    S.team = team;
  }catch(e){
    toast('Failed to load data: ' + e.message, true);
  }
}

async function loadMessages(ticketId){
  const { data, error } = await sb.from('ticket_messages').select('*').eq('ticket_id', ticketId).order('created_at',{ascending:true});
  if(error){ toast('Failed to load messages', true); return []; }
  S.messages[ticketId] = data;
  return data;
}

/* ============================================================
   REALTIME
   ============================================================ */
function subscribeRealtime(){
  sb.channel('support-tickets')
    .on('postgres_changes', { event:'*', schema:'public', table:'tickets' }, payload=>{
      if(isUserActivelyWorking() && S.page==='ticket_detail') return;
      handleTicketRealtime(payload);
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'ticket_messages' }, payload=>{
      const m = payload.new;
      if(!S.messages[m.ticket_id]) S.messages[m.ticket_id] = [];
      const alreadyHave = S.messages[m.ticket_id].some(x=>x.id===m.id);
      if(!alreadyHave){
        S.messages[m.ticket_id].push(m);
        if(S.activeTicket && S.activeTicket.id === m.ticket_id){
          document.getElementById('threadBox').innerHTML = renderThread(S.messages[m.ticket_id], showingNotes);
          scrollThreadToBottom();
        } else if(m.sender_type === 'customer' && !m.is_internal_note){
          const t = S.tickets.find(x=>x.id===m.ticket_id);
          const nowStr = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
          toast('New reply on ticket' + (t ? ' #' + t.ticket_number : '') + ' from ' + (m.sender_name||'customer') + ' · ' + nowStr);
        }
      }
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'warranty_claims' }, payload=>{
      handleErpClaimUpdate('warranty', payload.old, payload.new);
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'shipment_errors' }, payload=>{
      handleErpClaimUpdate('shipment_error', payload.old, payload.new);
    })
    .subscribe();
}

/* ============================================================
   ERP → TICKET PING-BACK
   When the ERP ships a warranty claim (status → 'Shipped') or a
   shipment error (tracking_number newly set / status → 'Reshipping'),
   reflect that on the linked ticket automatically: bump its status,
   flag it unread, and drop an internal note so staff see it happened
   without having to go check the ERP themselves.
   ============================================================ */
async function handleErpClaimUpdate(kind, oldRow, newRow){
  const idx = kind==='warranty' ? S.warranty.findIndex(w=>w.id===newRow.id) : S.shipErrors.findIndex(e=>e.id===newRow.id);
  if(idx!==-1){ if(kind==='warranty'){ S.warranty[idx]=newRow; } else { S.shipErrors[idx]=newRow; } }
  if(S.page==='warranty' || S.page==='shiperrors') renderPage();

  const justShipped = (!oldRow.tracking_number && newRow.tracking_number) ||
    (oldRow.status !== newRow.status && ['Shipped','Reshipping'].includes(newRow.status));
  if(!justShipped) return;

  const ticket = kind==='warranty'
    ? S.tickets.find(t=>t.warranty_claim_id===newRow.id)
    : S.tickets.find(t=>t.shipment_error_id===newRow.id);
  if(!ticket) return;

  try{
    const noteBody = `📦 ERP update: ${kind==='warranty'?'Warranty claim':'Shipment error'} marked as shipped`
      + (newRow.carrier ? ` via ${newRow.carrier}` : '')
      + (newRow.tracking_number ? ` — tracking: ${newRow.tracking_number}` : '')
      + `. (Synced automatically from the ERP.)`;

    await sb.from('ticket_messages').insert({
      ticket_id: ticket.id,
      sender_type: 'system',
      sender_name: 'System',
      body: noteBody,
      is_internal_note: true
    });

    const needsUpdate = !['closed','resolved'].includes(ticket.status);
    const { data: updated, error } = await sb.from('tickets').update({
      status: needsUpdate ? 'waiting_customer' : ticket.status,
      has_unread: true,
      updated_at: new Date().toISOString()
    }).eq('id', ticket.id).select().single();
    if(error) throw error;

    const tIdx = S.tickets.findIndex(t=>t.id===ticket.id);
    if(tIdx!==-1) S.tickets[tIdx] = updated;
    if(S.activeTicket && S.activeTicket.id===ticket.id){
      S.activeTicket = updated;
      await loadMessages(ticket.id);
      renderTicketPanel(updated);
    }
    toast(`Ticket #${updated.ticket_number} updated — shipped from the ERP`);
    renderNav();
    if(S.page==='tickets' || S.page==='dashboard') renderPage();
  }catch(e){
    console.error('Failed to sync ERP shipment back to ticket:', e);
  }
}

function handleTicketRealtime(payload){
  const idx = S.tickets.findIndex(t=>t.id === (payload.new?.id || payload.old?.id));
  if(payload.eventType === 'INSERT'){
    if(idx === -1) S.tickets.unshift(payload.new);
    toast('New ticket: ' + payload.new.subject);
  } else if(payload.eventType === 'UPDATE'){
    if(idx !== -1) S.tickets[idx] = payload.new;
  } else if(payload.eventType === 'DELETE'){
    if(idx !== -1) S.tickets.splice(idx,1);
  }
  renderNav();
  if(S.page === 'tickets' || S.page === 'dashboard') renderPage();
}

const NAV = [

function renderNav(){
  const nav = document.getElementById('navList');
  nav.innerHTML = NAV.map(n=>{
    let badge = '';
    let alertClass = '';
    if(n.badgeKey==='tickets'){
      const activeTix = S.tickets.filter(t=>!t.archived);
      const unreadMsgs = activeTix.reduce((sum,t)=> sum + (t.has_unread ? (t.unread_count||1) : 0), 0);
      if(unreadMsgs){
        badge = `<span class="nav-badge" style="color:var(--red);background:var(--red-dim);border-color:rgba(220,38,38,.25)" title="${unreadMsgs} unread message${unreadMsgs===1?'':'s'}">${unreadMsgs}</span>`;
        alertClass = 'alert-nav';
      } else {
        const openCount = activeTix.filter(t=>['open','pending','waiting_customer'].includes(t.status)).length;
        if(openCount) badge = `<span class="nav-badge">${openCount}</span>`;
      }
    }
    if(n.badgeKey==='warranty'){
      const c = S.warranty.filter(w=>isActiveClaim(w.status) && !S.tickets.some(t=>t.warranty_claim_id===w.id)).length;
      if(c){ badge = `<span class="nav-badge">${c}</span>`; alertClass='alert-nav'; }
    }
    if(n.badgeKey==='shiperrors'){
      const c = S.shipErrors.filter(e=>isActiveClaim(e.status) && !S.tickets.some(t=>t.shipment_error_id===e.id)).length;
      if(c){ badge = `<span class="nav-badge">${c}</span>`; alertClass='alert-nav'; }
    }
    return `<button class="nav-item ${S.page===n.id?'active':''} ${alertClass}" onclick="goPage('${n.id}')">
      <span class="nav-dot"></span>${n.label}${badge}
    </button>`;
  }).join('');
}

function goPage(id){
  S.page = id;
  renderNav();
  document.getElementById('pageTitle').textContent = (NAV.find(n=>n.id===id)||{}).label || 'Dashboard';
  renderPage();
}

async function bulkUpdateField(field, value){
  const ids = Array.from(S.selectedTickets);
  if(!ids.length) return;
  try{
    const patch = { [field]: value, updated_at: new Date().toISOString() };
    if(field==='status' && (value==='resolved'||value==='closed')) patch.resolved_at = new Date().toISOString();
    const { data, error } = await sb.from('tickets').update(patch).in('id', ids).select();
    if(error) throw error;
    (data||[]).forEach(updated=>{
      const idx = S.tickets.findIndex(x=>x.id===updated.id);
      if(idx!==-1) S.tickets[idx] = updated;
    });
    // Log activity per ticket (best-effort, doesn't block on failure)
    ids.forEach(id=> logActivity(id, field, null, value));
    toast(`Updated ${ids.length} ticket${ids.length===1?'':'s'}`);
    renderNav();
    renderTicketsList();
  }catch(e){
    toast('Bulk update failed: ' + e.message, true);
  }
}

function bulkSetPriority(priority){ bulkUpdateField('priority', priority); }

function bulkAssign(value){ bulkUpdateField('assigned_to', value==='__unassigned__' ? null : value); }

function filteredTickets(){
  let list = S.tickets.slice();
  const f = S.filters;
  if(!f.showArchived) list = list.filter(t=>!t.archived);
  if(f.status) list = list.filter(t=>t.status===f.status);
  if(f.priority) list = list.filter(t=>t.priority===f.priority);
  if(f.source) list = list.filter(t=>t.source===f.source);
  if(f.tag) list = list.filter(t=>(t.tags||[]).includes(f.tag));
  if(f.assignedTo === '__unassigned__') list = list.filter(t=>!t.assigned_to);
  else if(f.assignedTo) list = list.filter(t=>t.assigned_to===f.assignedTo);
  if(f.staleOnly) list = list.filter(isStale);
  if(f.q){
    const q = f.q.toLowerCase();
    list = list.filter(t=>
      (t.subject||'').toLowerCase().includes(q) ||
      (t.customer_name||'').toLowerCase().includes(q) ||
      (t.customer_email||'').toLowerCase().includes(q) ||
      (t.order_number||'').toLowerCase().includes(q) ||
      (t.pn||'').toLowerCase().includes(q)
    );
  }
  return list;
}

function label(s){ return (s||'').replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase()); }

const CLAIM_DONE_STATUSES = ['Resolved','Closed','Denied'];
function isActiveClaim(status){ return !CLAIM_DONE_STATUSES.includes(status); }

const STALE_THRESHOLD_HOURS = 24;
function isStale(t){
  if(!['open','pending'].includes(t.status)) return false;
  return (Date.now() - new Date(t.updated_at).getTime()) > STALE_THRESHOLD_HOURS * 3600000;
}

function friendlyStaffName(){
  if(!S.user || !S.user.email) return '';
  return S.user.email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function timeAgo(dstr){
  if(!dstr) return '—';
  const diff = Date.now() - new Date(dstr).getTime();
  const mins = Math.floor(diff/60000);
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs/24) + 'd ago';
}

          <td><span class="pill ${STATUS_PILL[e.status]||'pill-muted'}">${escapeHtml(e.status||'—')}</span></td>
          <td class="pn">${e.claim_cost ? '$'+Number(e.claim_cost).toFixed(2) : '—'}</td>
          <td>${linkedTicket ? `<span class="pill pill-teal" style="cursor:pointer" onclick="goPage('tickets'); setTimeout(()=>openTicket('${linkedTicket.id}'),50)">#${linkedTicket.ticket_number}</span>` : '<span class="pill pill-muted">None</span>'}</td>
          <td>${linkedTicket ? '' : `<button class="btn btn-sm btn-teal" onclick="convertToTicket('shipment_error','${e.id}')">Create Ticket</button>`}</td>
        </tr>
      `;}).join('')}
    </tbody></table></div>`}
  `;
}

async function convertToTicket(kind, recordId){
  const record = kind==='warranty' ? S.warranty.find(w=>w.id===recordId) : S.shipErrors.find(e=>e.id===recordId);
  if(!record){ toast('Record not found', true); return; }
  const recordPn = kind==='warranty' ? record.pn : record.expected_pn;
  const subject = kind==='warranty'
    ? `Warranty claim — order #${record.order_number||'?'} / ${recordPn||'?'}`
    : `Shipment error — order #${record.order_number||'?'} / ${recordPn||'?'}`;
  const payload = {
    source: kind==='warranty' ? 'warranty' : 'shipment_error',
    status: 'open',
    priority: 'medium',
    subject,
    order_number: record.order_number || null,
    pn: recordPn || null,
    warranty_claim_id: kind==='warranty' ? record.id : null,
    shipment_error_id: kind==='shipment_error' ? record.id : null,
  };
  try{
    const { data, error } = await sb.from('tickets').insert(payload).select().single();
    if(error) throw error;
    S.tickets.unshift(data);
    toast('Ticket #' + data.ticket_number + ' created');
    goPage('tickets');
    openTicket(data.id);
  }catch(e){
    toast('Failed to create ticket: ' + e.message, true);
  }
}

async function confirmSendToERP(ticketId, kind){
  const table = kind==='warranty' ? 'warranty_claims' : 'shipment_errors';
  const val = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };

  let payload;
  if(kind==='warranty'){
    const t = S.tickets.find(x=>x.id===ticketId);
    const validItems = warrantyClaimItems.filter(i=>i.pn && i.pn.trim());
    const primaryPn = validItems.length ? validItems[0].pn.trim() : '';
    payload = {
      order_number: val('erpOrder'),
      pn: primaryPn,
      claim_items: validItems.length ? validItems.map(i=>({ pn: i.pn.trim(), qty: i.qty||1, description: i.description||'' })) : null,
      customer_name: val('erpCustomer') || null,
      issue: val('erpIssue') || null,
      status: val('erpStatus'),
      resolution_type: val('erpResolutionType') || null,
      resolution: val('erpResolution') || null,
      claim_cost: val('erpClaimCost') ? parseFloat(val('erpClaimCost')) : null,
      tracking_number: val('erpTracking') || null,
      carrier: val('erpCarrier') || null,
      shipping_details: (t && t.shipping_address && Object.values(t.shipping_address).some(v=>v)) ? t.shipping_address : null
    };
    if(!payload.order_number || !payload.pn){ toast('Order number and at least one part number are required', true); return; }
  } else {
    const t = S.tickets.find(x=>x.id===ticketId);
    payload = {
      order_number: val('erpOrder'),
      customer_name: val('erpCustomer') || null,
      customer_email: val('erpCustomerEmail') || null,
      error_type: val('erpErrorType'),
      expected_pn: val('erpExpectedPn') || null,
      actual_pn: val('erpActualPn') || null,
      resolution: val('erpResolution') || null,
      notes: val('erpNotes') || null,
      status: val('erpStatus'),
      tracking_number: val('erpTracking') || null,
      carrier: val('erpCarrier') || null,
      claim_cost: val('erpClaimCost') ? parseFloat(val('erpClaimCost')) : null,
      shipping_details: (t && t.shipping_address && Object.values(t.shipping_address).some(v=>v)) ? t.shipping_address : null
    };
    const expQty = val('erpExpectedQty'), actQty = val('erpActualQty');
    if(expQty) payload.expected_qty = parseInt(expQty, 10);
    if(actQty) payload.actual_qty = parseInt(actQty, 10);
    if(!payload.order_number || !payload.expected_pn){ toast('Order number and expected part number are required', true); return; }
  }

  try{
    const { data, error } = await sb.from(table).insert(payload).select().single();
    if(error) throw error;
    if(kind==='warranty'){ S.warranty.unshift(data); } else { S.shipErrors.unshift(data); }

    const linkPatch = kind==='warranty'
      ? { warranty_claim_id: data.id, updated_at: new Date().toISOString() }
      : { shipment_error_id: data.id, updated_at: new Date().toISOString() };
    const { data: updated, error: updErr } = await sb.from('tickets').update(linkPatch).eq('id', ticketId).select().single();
    if(updErr) throw updErr;
    const idx = S.tickets.findIndex(x=>x.id===ticketId);
    if(idx!==-1) S.tickets[idx] = updated;
    S.activeTicket = updated;

    const kindLabelLower = kind==='warranty' ? 'warranty claim' : 'shipment error';
    await sb.from('ticket_messages').insert({
      ticket_id: ticketId,
      sender_type: 'system',
      sender_name: 'System',
      body: `📦 Sent to ERP as a ${kindLabelLower} by ${S.user.email} — the warehouse team will see this in their queue.`,
      is_internal_note: true
    });
    await loadMessages(ticketId);

    closeModal();
    toast((kind==='warranty'?'Warranty claim':'Shipment error') + ' created in the ERP — warehouse will see it in their queue');
    renderNav();
    renderTicketPanel(updated);
  }catch(e){
    toast('Failed to send to ERP: ' + e.message, true);
  }
}
window.confirmSendToERP = confirmSendToERP;

async function runCustomerSearch(){
  const q = document.getElementById('custSearchInput').value.trim();
  const box = document.getElementById('custSearchResults');
  if(!q){ box.innerHTML = `<div class="empty">Enter an email or order number.</div>`; return; }
  box.innerHTML = `<div class="empty">Searching...</div>`;

  try{
    const isEmail = q.includes('@');
    let salesRows = [], ticketRows = [];

    if(isEmail){
      [salesRows, ticketRows] = await Promise.all([
        sb.from('sales').select('*').ilike('customer_email', q).then(r=>r.data||[]),
        sb.from('tickets').select('*').ilike('customer_email', q).order('created_at',{ascending:false}).then(r=>r.data||[])
      ]);
    } else {
      const orderVariants = q.startsWith('#') ? [q, q.slice(1)] : [q, '#'+q];
      [salesRows, ticketRows] = await Promise.all([
        findSalesByOrderNumber(q),
        sb.from('tickets').select('*').in('order_number', orderVariants).order('created_at',{ascending:false}).then(r=>r.data||[])
      ]);
    }

    const orderNumbers = [...new Set([...salesRows.map(s=>s.order_number), ...ticketRows.map(t=>t.order_number)].filter(Boolean))];
    let warrantyRows = [], shipErrRows = [];
    if(orderNumbers.length){
      [warrantyRows, shipErrRows] = await Promise.all([
        sb.from('warranty_claims').select('*').in('order_number', orderNumbers).then(r=>r.data||[]),
        sb.from('shipment_errors').select('*').in('order_number', orderNumbers).then(r=>r.data||[])
      ]);
    }

    if(!salesRows.length && !ticketRows.length && !warrantyRows.length && !shipErrRows.length){
      box.innerHTML = `<div class="empty">No records found for "${escapeHtml(q)}".</div>`;
      return;
    }

    box.innerHTML = `
      ${ticketRows.length ? `
        <div class="panel-title" style="border:none">Support Tickets (${ticketRows.length})</div>
        ${ticketTable(ticketRows)}
      ` : ''}
      ${salesRows.length ? `
        <div class="panel-title" style="border:none;margin-top:20px">Orders (${salesRows.length})</div>
        <div class="tbl-wrap"><table><thead><tr><th>Order</th><th>PN</th><th>Qty</th><th>Fulfillment</th><th>Tracking</th><th>Date</th></tr></thead>
        <tbody>${salesRows.map(s=>`<tr>
          <td>#${escapeHtml(s.order_number||'—')}</td>
          <td class="pn">${escapeHtml(s.pn||'—')}</td>
          <td>${s.quantity??s.qty??'—'}</td>
          <td><span class="pill pill-muted">${escapeHtml(s.fulfillment_status||'—')}</span></td>
          <td class="pn">${escapeHtml(s.tracking_number||'—')}</td>
          <td class="pn">${s.sale_date||timeAgo(s.created_at)}</td>
        </tr>`).join('')}</tbody></table></div>
      ` : ''}
      ${warrantyRows.length ? `
        <div class="panel-title" style="border:none;margin-top:20px">Warranty Claims (${warrantyRows.length})</div>
        <div class="tbl-wrap"><table><thead><tr><th>Order</th><th>PN</th><th>Status</th><th>Issue</th><th>Date</th></tr></thead>
        <tbody>${warrantyRows.map(w=>`<tr>
          <td>#${escapeHtml(w.order_number||'—')}</td>
          <td class="pn">${escapeHtml(w.pn||'—')}</td>
          <td><span class="pill ${isActiveClaim(w.status)?'pill-orange':'pill-green'}">${escapeHtml(w.status||'—')}</span></td>
          <td>${escapeHtml((w.issue||'').slice(0,80))}${(w.issue||'').length>80?'…':''}</td>
          <td class="pn">${timeAgo(w.created_at)}</td>
        </tr>`).join('')}</tbody></table></div>
      ` : ''}
      ${shipErrRows.length ? `
        <div class="panel-title" style="border:none;margin-top:20px">Shipment Errors (${shipErrRows.length})</div>
        <div class="tbl-wrap"><table><thead><tr><th>Order</th><th>PN</th><th>Status</th><th>Issue</th><th>Date</th></tr></thead>
        <tbody>${shipErrRows.map(e=>`<tr>
          <td>#${escapeHtml(e.order_number||'—')}</td>
          <td class="pn">${escapeHtml(e.pn||'—')}</td>
          <td><span class="pill ${isActiveClaim(e.status)?'pill-orange':'pill-green'}">${escapeHtml(e.status||'—')}</span></td>
          <td>${escapeHtml((e.issue||'').slice(0,80))}${(e.issue||'').length>80?'…':''}</td>
          <td class="pn">${timeAgo(e.created_at)}</td>
        </tr>`).join('')}</tbody></table></div>
      ` : ''}
    `;
  }catch(e){
    box.innerHTML = `<div class="empty">Search failed: ${escapeHtml(e.message)}</div>`;
  }
}

function barRow(label, count, max, color){
  const pct = max > 0 ? Math.round((count/max)*100) : 0;
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <div style="width:140px;font-size:12px;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(label)}</div>
    <div style="flex:1;background:var(--bg4);border-radius:4px;height:16px;overflow:hidden">
      <div style="width:${pct}%;background:${color||'var(--teal)'};height:100%;border-radius:4px"></div>
    </div>
    <div style="width:36px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--text2)">${count}</div>
  </div>`;
}

function renderReports(){
  const el = document.getElementById('content');
  const t = S.tickets;

  const weeks = [];
  for(let i=7;i>=0;i--){
    const start = new Date(); start.setDate(start.getDate() - i*7); start.setHours(0,0,0,0);
    const end = new Date(start); end.setDate(end.getDate()+7);
    const count = t.filter(x=>{ const d=new Date(x.created_at); return d>=start && d<end; }).length;
    weeks.push({ label: start.toLocaleDateString('en-US',{month:'short',day:'numeric'}), count });
  }
  const maxWeek = Math.max(1, ...weeks.map(w=>w.count));

  const bySource = {};
  t.forEach(x=> bySource[x.source] = (bySource[x.source]||0)+1);
  const maxSource = Math.max(1, ...Object.values(bySource), 1);

  const byTag = {};
  t.forEach(x=> (x.tags||[]).forEach(tag=> byTag[tag] = (byTag[tag]||0)+1));
  const maxTag = Math.max(1, ...Object.values(byTag), 1);

  const byAssignee = {};
  t.forEach(x=> { const key = x.assigned_to || 'Unassigned'; byAssignee[key] = (byAssignee[key]||0)+1; });
  const maxAssignee = Math.max(1, ...Object.values(byAssignee), 1);

  const resolved = t.filter(x=>x.resolved_at);
  const avgDays = resolved.length ? (resolved.reduce((s,x)=> s + (new Date(x.resolved_at)-new Date(x.created_at)),0) / resolved.length / 86400000).toFixed(1) : '—';
  const medianDays = (()=>{
    if(!resolved.length) return '—';
    const days = resolved.map(x=>(new Date(x.resolved_at)-new Date(x.created_at))/86400000).sort((a,b)=>a-b);
    const mid = Math.floor(days.length/2);
    return (days.length%2 ? days[mid] : (days[mid-1]+days[mid])/2).toFixed(1);
  })();

  const byOrder = {};
  t.forEach(x=>{ if(x.order_number) byOrder[x.order_number] = (byOrder[x.order_number]||0)+1; });
  const repeatOrders = Object.entries(byOrder).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]).slice(0,8);

  el.innerHTML = `
    <div class="kpi-grid kpi-grid-4">
      <div class="kpi"><div class="kpi-label">Total Tickets</div><div class="kpi-value">${t.length}</div></div>
      <div class="kpi kpi-teal"><div class="kpi-label">Avg Resolution (days)</div><div class="kpi-value">${avgDays}</div></div>
      <div class="kpi kpi-orange"><div class="kpi-label">Median Resolution (days)</div><div class="kpi-value">${medianDays}</div></div>
      <div class="kpi kpi-red"><div class="kpi-label">Repeat-Issue Orders</div><div class="kpi-value">${repeatOrders.length}</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">Ticket Volume — Last 8 Weeks</div>
      ${weeks.map(w=>barRow(w.label, w.count, maxWeek)).join('')}
    </div>

let showingNotes = false;

async function openTicket(id){
  const t = S.tickets.find(x=>x.id===id);
  if(!t){ toast('Ticket not found', true); return; }
  S.activeTicket = t;
  showingNotes = false;
  await loadMessages(id);
  renderTicketPanel(t);
  document.getElementById('tk-overlay').classList.add('open');
  document.getElementById('tk-panel').classList.add('open');
  scrollThreadToBottom();

  if(t.order_number){
    await lookupOrderForTicket(id, t.order_number);
    scrollThreadToBottom();
  }

  if(t.has_unread || t.unread_count > 0){
    try{
      const { data: updated, error } = await sb.from('tickets').update({ has_unread: false, unread_count: 0 }).eq('id', id).select().single();
      if(!error){
        const idx = S.tickets.findIndex(x=>x.id===id);
        if(idx!==-1) S.tickets[idx] = updated;
        S.activeTicket = updated;
        renderNav();
      }
    }catch(e){ /* non-critical */ }
  }
}
window.openTicket = openTicket;

function closePanel(){
  document.getElementById('tk-overlay').classList.remove('open');
  document.getElementById('tk-panel').classList.remove('open');
  S.activeTicket = null;
}
window.closePanel = closePanel;

function switchThreadTab(mode){
  showingNotes = (mode === 'notes');
  document.getElementById('tabConv').classList.toggle('active', mode==='conv');
  document.getElementById('tabNotes').classList.toggle('active', mode==='notes');
  document.getElementById('tabActivity').classList.toggle('active', mode==='activity');
  const composer = document.getElementById('replyComposer');
  const foot = document.getElementById('tkFoot');
  if(mode === 'activity'){
    if(composer) composer.style.display = 'none';
    if(foot) foot.style.display = 'none';
    document.getElementById('threadBox').innerHTML = renderActivityLog(S.activityLog[S.activeTicket.id]||[]);
  } else {
    if(composer) composer.style.display = '';
    if(foot) foot.style.display = 'flex';
    document.getElementById('threadBox').innerHTML = renderThread(S.messages[S.activeTicket.id]||[], showingNotes);
    scrollThreadToBottom();

    if(composer) composer.setAttribute('data-mode', mode);
    const label = document.getElementById('composerModeLabel');
    const msgBox = document.getElementById('msgBox');
    const emailRow = document.getElementById('emailChkRow');
    const sendBtn = document.getElementById('sendBtn');
    const t = S.activeTicket;
    if(mode === 'notes'){
      if(label){ label.textContent = 'Writing an Internal Note — staff only, never sent to the customer'; label.style.color = 'var(--orange)'; }
      if(msgBox) msgBox.placeholder = 'Type an internal note...';
      if(emailRow) emailRow.style.display = 'none';
      if(sendBtn){ sendBtn.textContent = 'Add Note'; sendBtn.classList.remove('btn-primary'); sendBtn.classList.add('btn-teal'); }
    } else {
      if(label){ label.textContent = 'Replying in Conversation — visible to customer'; label.style.color = 'var(--text3)'; }
      if(msgBox) msgBox.placeholder = 'Type a reply...';
      if(emailRow) emailRow.style.display = (t && t.customer_email) ? 'flex' : 'none';
      if(sendBtn){ sendBtn.textContent = 'Send'; sendBtn.classList.remove('btn-teal'); sendBtn.classList.add('btn-primary'); }
    }
  }
}
window.switchThreadTab = switchThreadTab;

async function loadActivityLog(ticketId){
  const { data, error } = await sb.from('ticket_activity_log').select('*').eq('ticket_id', ticketId).order('changed_at',{ascending:false});
  if(!error){
    S.activityLog[ticketId] = data || [];
    const activityTab = document.getElementById('tabActivity');
    if(activityTab && activityTab.classList.contains('active')){
      document.getElementById('threadBox').innerHTML = renderActivityLog(S.activityLog[ticketId]);
    }
  }
}

function renderActivityLog(entries){
  if(!entries.length) return `<div class="empty">No changes logged yet.</div>`;
  const FIELD_LABELS = { status:'Status', priority:'Priority', assigned_to:'Assigned To', tag_added:'Tag Added', tag_removed:'Tag Removed' };
  return entries.map(e=>{
    const fieldLabel = FIELD_LABELS[e.field_changed] || e.field_changed;
    let desc;
    if(e.field_changed==='tag_added') desc = `Added tag "${escapeHtml(e.new_value)}"`;
    else if(e.field_changed==='tag_removed') desc = `Removed tag "${escapeHtml(e.old_value)}"`;
    else desc = `${fieldLabel} changed from "${escapeHtml(e.old_value||'—')}" to "${escapeHtml(e.new_value||'—')}"`;
    return `<div class="msg system">
      <div class="meta"><span>${escapeHtml(e.changed_by||'System')}</span><span>·</span><span>${timeAgo(e.changed_at)}</span></div>
      <div>${desc}</div>
    </div>`;
  }).join('');
}

function scrollThreadToBottom(){
  const box = document.getElementById('threadBox');
  if(box) box.scrollTop = box.scrollHeight;
}

function renderAttachments(attachments){
  if(!attachments || !attachments.length) return '';
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
    ${attachments.map(a=>{
      const isImg = /\.(png|jpe?g|gif|webp)$/i.test(a.url||a.name||'');
      return isImg
        ? `<a href="${a.url}" target="_blank"><img src="${a.url}" alt="${escapeHtml(a.name||'attachment')}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--border)"></a>`
        : `<a href="${a.url}" target="_blank" class="src-tag">📎 ${escapeHtml(a.name||'file')}</a>`;
    }).join('')}
  </div>`;
}

function renderThread(msgs, notesOnly){
  const list = msgs.filter(m => notesOnly ? m.is_internal_note : !m.is_internal_note);
  if(!list.length) return `<div class="empty">${notesOnly?'No internal notes yet.':'No messages yet.'}</div>`;
  return list.map(m=>`
    <div class="msg ${m.is_internal_note?'note':m.sender_type}">
      <div class="meta"><span>${escapeHtml(m.sender_name||m.sender_type)}</span><span>·</span><span>${timeAgo(m.created_at)}</span>${m.emailed_at?'<span>·</span><span style="color:var(--teal)">✉ Emailed</span>':''}</div>
      <div>${escapeHtml(m.body).replace(/\n/g,'<br>')}</div>
      ${renderAttachments(m.attachments)}
    </div>
  `).join('');
}

const TRACKED_ACTIVITY_FIELDS = ['status','priority','assigned_to'];

async function logActivity(ticketId, fieldChanged, oldValue, newValue){
  try{
    await sb.from('ticket_activity_log').insert({
      ticket_id: ticketId,
      field_changed: fieldChanged,
      old_value: oldValue!=null ? String(oldValue) : null,
      new_value: newValue!=null ? String(newValue) : null,
      changed_by: S.user ? S.user.email : null
    });
  }catch(e){ /* non-critical, don't block the actual update on log failure */ }
}

async function updateTicketField(id, field, value){
  try{
    const before = S.tickets.find(x=>x.id===id);
    const oldValue = before ? before[field] : undefined;
    const patch = { [field]: value, updated_at: new Date().toISOString() };
    if(field==='status' && (value==='resolved'||value==='closed')) patch.resolved_at = new Date().toISOString();
    const { data, error } = await sb.from('tickets').update(patch).eq('id', id).select().single();
    if(error) throw error;
    const idx = S.tickets.findIndex(x=>x.id===id);
    if(idx!==-1) S.tickets[idx] = data;
    S.activeTicket = data;
    if(TRACKED_ACTIVITY_FIELDS.includes(field) && oldValue !== value){
      await logActivity(id, field, oldValue, value);
    }
    toast('Ticket updated');
    renderNav();
    if(S.page!=='dashboard') renderPage();
    if(S.activeTicket && S.activeTicket.id === id){
      renderTicketPanel(data);
    }
  }catch(e){
    toast('Update failed: ' + e.message, true);
  }
}
window.updateTicketField = updateTicketField;

function archiveTicket(id){
  const t = S.tickets.find(x=>x.id===id);
  if(!t) return;

  const linkedWarranty = t.warranty_claim_id ? S.warranty.find(w=>w.id===t.warranty_claim_id) : null;
  const linkedShipErr = t.shipment_error_id ? S.shipErrors.find(e=>e.id===t.shipment_error_id) : null;
  const linked = linkedWarranty || linkedShipErr;

  if(!linked){
    if(!confirm(`Archive ticket #${t.ticket_number} — "${t.subject}"? It'll disappear from your active lists but stays in the system — if the customer replies later, it reopens automatically instead of creating a confusing new ticket.`)) return;
    performArchiveTicket(id, false);

  const ov = document.getElementById('modalOverlay');
  ov.classList.remove('hidden');
  ov.innerHTML = `

async function performArchiveTicket(id, alsoDeleteLinked){
  const t = S.tickets.find(x=>x.id===id);
  if(!t) return;
  try{
    if(alsoDeleteLinked){
      if(t.warranty_claim_id){
        const { error } = await sb.from('warranty_claims').delete().eq('id', t.warranty_claim_id);
        if(error) throw error;
        S.warranty = S.warranty.filter(w=>w.id!==t.warranty_claim_id);
      }
      if(t.shipment_error_id){
        const { error } = await sb.from('shipment_errors').delete().eq('id', t.shipment_error_id);
        if(error) throw error;
        S.shipErrors = S.shipErrors.filter(e=>e.id!==t.shipment_error_id);
      }
    }
    const { data, error } = await sb.from('tickets').update({ archived: true, archived_at: new Date().toISOString() }).eq('id', id).select().single();
    if(error) throw error;
    const idx = S.tickets.findIndex(x=>x.id===id);
    if(idx!==-1) S.tickets[idx] = data;
    await logActivity(id, 'archived', 'false', 'true');
    closePanel();
    toast('Ticket #' + t.ticket_number + ' archived' + (alsoDeleteLinked ? ' along with its linked ERP record' : ''));
    renderNav();
    renderPage();
  }catch(e){
    toast('Failed to archive: ' + e.message, true);
  }
}

async function emailReturnLabel(ticketId){
  const t = S.tickets.find(x=>x.id===ticketId);
  if(!t){ toast('Ticket not found', true); return; }
  if(!t.customer_email){ toast('No customer email on file', true); return; }
  if(!t.return_label_url){ toast('No label to email', true); return; }

  if(!confirm(`Email the return label to ${t.customer_email}?`)) return;

  const body = `Please find your return shipping label attached below. Print it out and attach it to your return package before dropping it off.\n\nTracking number: ${t.return_tracking_number || 'N/A'}${t.return_carrier ? ' ('+t.return_carrier+')' : ''}`;

  try{

    const { data, error } = await sb.from('ticket_messages').insert({

      sender_type: 'staff',
      sender_name: S.user.email,
      body,
      is_internal_note: false,
      attachments: [{ name: 'return-label.pdf', url: t.return_label_url }]
    }).select().single();
    if(error) throw error;
    if(!S.messages[ticketId]) S.messages[ticketId] = [];
    S.messages[ticketId].push(data);

    const resp = await fetch(`${SUPABASE_URL}/functions/v1/send-ticket-email`, {
      method: 'POST',

      body: JSON.stringify({

        message_id: data.id,
        to: t.customer_email,
        subject: `TGK Motorsport Support #${String(t.ticket_number).padStart(4,'0')}`,
        body,
        attachments: data.attachments || [],
        staff_name: friendlyStaffName()

async function submitRefund(ticketId){
  const t = S.tickets.find(x=>x.id===ticketId);
  const btn = document.getElementById('refundSubmitBtn');
  const refundAmount = parseFloat(document.getElementById('refundAmount').value);
  const restockingFee = parseFloat(document.getElementById('refundRestockingFee').value) || 0;
  const reason = document.getElementById('refundReason').value.trim();

  if(!refundAmount || refundAmount <= 0){
    toast('Enter a valid refund amount', true);
    return;
  }

  const selectedItems = refundLineItems.filter(i => i.selected && i.shopify_line_item_id);

  btn.disabled = true;
  btn.textContent = 'Processing...';

  try{
    const rows = await findSalesByOrderNumber(t.order_number);
    const shopifyOrderId = rows[0]?.shopify_order_id;

    const resp = await fetch(`${SUPABASE_URL}/functions/v1/process-shopify-refund`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({
        ticket_id: ticketId,
        ticket_number: t.ticket_number,
        shopify_order_id: shopifyOrderId,
        line_items: selectedItems.map(i => ({ shopify_line_item_id: i.shopify_line_item_id, quantity: i.qty })),
        refund_amount: refundAmount,
        restocking_fee: restockingFee,
        reason
      })
    });
    const result = await resp.json();
    if(!resp.ok) throw new Error(result.error || 'Refund failed');

    const { data: updated } = await sb.from('tickets').select('*').eq('id', ticketId).single();
    if(updated){
      const idx = S.tickets.findIndex(x=>x.id===ticketId);
      if(idx!==-1) S.tickets[idx] = updated;
      S.activeTicket = updated;
      await loadMessages(ticketId);
      renderTicketPanel(updated);
    }
    closeModal();
    toast(`Refund of $${refundAmount.toFixed(2)} processed successfully`);
  }catch(e){
    toast('Refund failed: ' + e.message, true);
    btn.disabled = false;
    btn.textContent = 'Process Refund';
  }
}
window.submitRefund = submitRefund;

      <button class="btn btn-sm btn-teal">Merge Here</button>
    </div>
  `).join('');
}

function renderMergeCandidates(sourceId, query){
  const q = query.trim().toLowerCase();
  let candidates = S.tickets.filter(x=>x.id!==sourceId && !x.merged_into_id);
  if(q){
    candidates = candidates.filter(c=>
      String(c.ticket_number).includes(q) ||
      (c.subject||'').toLowerCase().includes(q) ||
      (c.customer_name||'').toLowerCase().includes(q) ||
      (c.customer_email||'').toLowerCase().includes(q)
    );
  }
  document.getElementById('mergeCandidateList').innerHTML = renderMergeCandidateRows(candidates.slice(0,20), sourceId);
}
window.renderMergeCandidates = renderMergeCandidates;

async function confirmMerge(sourceId, targetId){
  const source = S.tickets.find(x=>x.id===sourceId);
  const target = S.tickets.find(x=>x.id===targetId);
  if(!source || !target) return;
  if(!confirm(`Merge ticket #${source.ticket_number} into #${target.ticket_number}? This moves all its messages and closes #${source.ticket_number}.`)) return;

  try{
    // Move all messages from source to target
    const { error: moveErr } = await sb.from('ticket_messages').update({ ticket_id: targetId }).eq('ticket_id', sourceId);
    if(moveErr) throw moveErr;

    // Drop a system note in the target thread noting the merge
    await sb.from('ticket_messages').insert({
      ticket_id: targetId,
      sender_type: 'system',
      sender_name: 'System',
      body: `Ticket #${source.ticket_number} ("${source.subject}") was merged into this ticket by ${S.user.email}.`,
      is_internal_note: true
    });

    // Close and flag the source ticket
    const { data: updatedSource, error: srcErr } = await sb.from('tickets')
      .update({ status:'closed', merged_into_id: targetId, resolved_at: new Date().toISOString(), updated_at: new Date().toISOString() })
      .eq('id', sourceId).select().single();
    if(srcErr) throw srcErr;

    const { data: updatedTarget, error: tgtErr } = await sb.from('tickets')
      .update({ updated_at: new Date().toISOString() })
      .eq('id', targetId).select().single();
    if(tgtErr) throw tgtErr;

    const si = S.tickets.findIndex(x=>x.id===sourceId);
    if(si!==-1) S.tickets[si] = updatedSource;
    const ti = S.tickets.findIndex(x=>x.id===targetId);
    if(ti!==-1) S.tickets[ti] = updatedTarget;
    delete S.messages[sourceId];
    await loadMessages(targetId);

    closeModal();
    closePanel();
    toast(`Merged into ticket #${updatedTarget.ticket_number}`);
    renderNav();
    renderPage();
  }catch(e){
    toast('Merge failed: ' + e.message, true);
  }
}
window.confirmMerge = confirmMerge;

let pendingMsgAttachments = [];

async function handleMsgFileSelect(input){
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  const preview = document.getElementById('msgAttachPreview');
  for(const file of files){
    const chipId = 'up_' + Math.random().toString(36).slice(2);
    preview.insertAdjacentHTML('beforeend', `<span class="src-tag" id="${chipId}">Uploading ${escapeHtml(file.name)}...</span>`);
    try{
      const path = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const { error: upErr } = await sb.storage.from('ticket-attachments').upload(path, file);
      if(upErr) throw upErr;
      const { data: pub } = sb.storage.from('ticket-attachments').getPublicUrl(path);
      pendingMsgAttachments.push({ name: file.name, url: pub.publicUrl });
      const chip = document.getElementById(chipId);
      if(chip) chip.outerHTML = `<span class="src-tag">📎 ${escapeHtml(file.name)} <span style="cursor:pointer;color:var(--red)" onclick="removePendingAttachment('${pub.publicUrl}', this.parentElement)">✕</span></span>`;
    }catch(e){
      const chip = document.getElementById(chipId);
      if(chip) chip.outerHTML = `<span class="src-tag" style="color:var(--red)">Failed: ${escapeHtml(file.name)}</span>`;
      toast('Upload failed: ' + e.message, true);
    }
  }
  input.value = '';
}
window.handleMsgFileSelect = handleMsgFileSelect;

function removePendingAttachment(url, chipEl){
  pendingMsgAttachments = pendingMsgAttachments.filter(a=>a.url!==url);
  if(chipEl) chipEl.remove();
}
window.removePendingAttachment = removePendingAttachment;

async function sendMessage(ticketId){
  const box = document.getElementById('msgBox');
  const composer = document.getElementById('replyComposer');
  const isNote = composer && composer.getAttribute('data-mode') === 'notes';
  const emailChkEl = document.getElementById('emailChk');
  const shouldEmail = !isNote && emailChkEl && emailChkEl.checked;
  const body = box.value.trim();
  if(!body) return;
  const t = S.tickets.find(x=>x.id===ticketId);

  try{
    const { data, error } = await sb.from('ticket_messages').insert({
      ticket_id: ticketId,
      sender_type: 'staff',
      sender_name: S.user.email,
      body,
      is_internal_note: isNote,
      attachments: pendingMsgAttachments
    }).select().single();
    if(error) throw error;
    if(!S.messages[ticketId]) S.messages[ticketId] = [];
    S.messages[ticketId].push(data);
    box.value = '';
    pendingMsgAttachments = [];
    const preview = document.getElementById('msgAttachPreview');
    if(preview) preview.innerHTML = '';
    document.getElementById('threadBox').innerHTML = renderThread(S.messages[ticketId], showingNotes);
    scrollThreadToBottom();
    await sb.from('tickets').update({ updated_at: new Date().toISOString() }).eq('id', ticketId);

    if(shouldEmail && t && t.customer_email){
      toast('Sending email...');
      try{
        const resp = await fetch(`${SUPABASE_URL}/functions/v1/send-ticket-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({
            ticket_id: ticketId,
            ticket_number: t.ticket_number,
            message_id: data.id,
            to: t.customer_email,
            subject: `TGK Motorsport Support #${String(t.ticket_number).padStart(4,'0')}`,
            body,
            attachments: data.attachments || [],
            staff_name: friendlyStaffName()
          })
        });
        const result = await resp.json();
        if(!resp.ok) throw new Error(result.error || 'Email send failed');
        data.emailed_at = new Date().toISOString();
        document.getElementById('threadBox').innerHTML = renderThread(S.messages[ticketId], showingNotes);
        scrollThreadToBottom();
        toast('Reply sent and emailed to ' + t.customer_email);
      }catch(emailErr){
        toast('Message saved, but email failed to send: ' + emailErr.message, true);
      }
    }
  }catch(e){
    toast('Failed to send: ' + e.message, true);
  }
}
window.sendMessage = sendMessage;

/* ============================================================
   ORDER NUMBER LOOKUP HELPER
   Shopify order numbers are usually stored with a leading '#'
   (e.g. "#1041"), but staff/customers often type just "1041".
   Try both forms so this isn't a silent gotcha.
   ============================================================ */
async function findSalesByOrderNumber(orderNumberInput){
  const raw = (orderNumberInput||'').trim();
  if(!raw) return [];
  const variants = raw.startsWith('#') ? [raw, raw.slice(1)] : [raw, '#'+raw];
  for(const variant of variants){
    const { data, error } = await sb.from('sales').select('*').eq('order_number', variant);
    if(!error && data && data.length) return data;
  }
  return [];
}
window.findSalesByOrderNumber = findSalesByOrderNumber;

async function lookupOrder(ticketId){
  const t = S.tickets.find(x=>x.id===ticketId);
  if(!t || !t.order_number) return;
  const box = document.getElementById('orderLookupBox');
  box.innerHTML = `<div class="linked-box">Looking up order...</div>`;
  try{
    const data = (await findSalesByOrderNumber(t.order_number)).slice(0,5);
    if(!data.length){ box.innerHTML = `<div class="linked-box">No matching order found for #${escapeHtml(t.order_number)}.</div>`; return; }
    box.innerHTML = data.map(s=>`
      <div class="linked-box">
        <div class="lk-title">Order #${escapeHtml(s.order_number)}</div>
        PN: <span class="pn">${escapeHtml(s.pn||'—')}</span> · Qty: ${s.quantity??'—'} · Fulfillment: ${escapeHtml(s.fulfillment_status||'—')}
        ${s.tracking_number?' · Tracking: '+escapeHtml(s.tracking_number):''}
      </div>
    `).join('');
  }catch(e){
    box.innerHTML = `<div class="linked-box">Lookup failed: ${escapeHtml(e.message)}</div>`;
  }
}
window.lookupOrder = lookupOrder;

/* ============================================================
   ORDER → PARTS CONTEXT (expands assemblies into BOM children,
   since a customer issue is often with a component, not the
   top-level assembly they actually purchased)
   ============================================================ */
async function fetchOrderContext(orderNumber){
  if(!orderNumber) return null;
  const rows = await findSalesByOrderNumber(orderNumber);
  if(!rows.length) return null;
  const pns = [...new Set(rows.map(r=>r.pn).filter(Boolean))];
  let children = [];
  if(pns.length){
    const { data: bomRows } = await sb.from('bom_items').select('parent_pn,child_pn,qty').in('parent_pn', pns);
    children = bomRows || [];
  }
  return { rows, pns, children };
}

function buildPartOptions(ctx){
  const opts = [];
  ctx.pns.forEach(pn=>{
    const row = ctx.rows.find(r=>r.pn===pn);
    opts.push({ pn, label: `${pn}${row && row.qty ? ' (qty '+row.qty+')' : ''}`, indent:false });
    ctx.children.filter(c=>c.parent_pn===pn).forEach(k=>{
      opts.push({ pn: k.child_pn, label: `↳ ${k.child_pn} — component of ${pn}`, indent:true });
    });
  });
  return opts;
}

function renderPartOptionsHtml(opts, onClickFn){
  if(!opts.length) return `<div style="font-size:11px;color:var(--text3)">No parts found on this order.</div>`;
  return `<div class="form-label" style="margin:8px 0 4px">Parts On This Order — Click To Select</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${opts.map(o=>`<button type="button" class="btn btn-sm ${o.indent?'btn-teal':''}" onclick="${onClickFn}('${o.pn.replace(/'/g,"\\'")}')">${escapeHtml(o.label)}</button>`).join('')}
    </div>`;
}

/* Used by the "New Ticket" modal */
async function lookupOrderForModal(){
  const orderNumber = document.getElementById('ntOrder').value.trim();
  const box = document.getElementById('ntPartOptions');
  if(!orderNumber){ box.innerHTML=''; return; }
  box.innerHTML = `<div style="font-size:11px;color:var(--text3)">Looking up order...</div>`;
  const ctx = await fetchOrderContext(orderNumber);
  if(!ctx){ box.innerHTML = `<div style="font-size:11px;color:var(--text3)">No matching order found.</div>`; return; }
  const nameInput = document.getElementById('ntName');
  const emailInput = document.getElementById('ntEmail');
  const first = ctx.rows[0];
  if(nameInput && !nameInput.value && first.customer_name) nameInput.value = first.customer_name;
  if(emailInput && !emailInput.value && first.customer_email) emailInput.value = first.customer_email;
  box.innerHTML = renderPartOptionsHtml(buildPartOptions(ctx), 'selectNtPn');
}
window.lookupOrderForModal = lookupOrderForModal;

function selectNtPn(pn){
  const pnInput = document.getElementById('ntPn');
  if(pnInput) pnInput.value = pn;
}
window.selectNtPn = selectNtPn;

/* Used by the ticket detail panel */
async function lookupOrderForTicket(ticketId, orderNumber){
  let box = document.getElementById('tkPartOptions');
  if(!box) return;
  if(!orderNumber){ box.innerHTML=''; return; }
  box.innerHTML = `<div style="font-size:11px;color:var(--text3)">Looking up order...</div>`;
  const ctx = await fetchOrderContext(orderNumber);
  if(!ctx){
    box = document.getElementById('tkPartOptions');
    if(box) box.innerHTML = `<div style="font-size:11px;color:var(--text3)">No matching order found.</div>`;
    return;
  }
  const t = S.tickets.find(x=>x.id===ticketId);
  const first = ctx.rows[0];
  const patch = {};
  if(t && !t.customer_name && first.customer_name) patch.customer_name = first.customer_name;
  if(t && !t.customer_email && first.customer_email) patch.customer_email = first.customer_email;
  if(t && !t.customer_phone && first.customer_phone) patch.customer_phone = first.customer_phone;

  // Confirmed against the real `sales` schema: shipping_address1/2, shipping_city,
  // shipping_province, shipping_zip, shipping_country. Keys here match the ERP's
  // own shipping_details shape exactly: name/street1/street2/city/state/postal_code/country.
  const pick = (...keys) => { for(const k of keys){ if(first[k]) return first[k]; } return ''; };
  const hasExistingAddress = t && t.shipping_address && (t.shipping_address.street1 || t.shipping_address.city);
  if(t && !hasExistingAddress){
    const autoAddress = {
      name: t.customer_name || first.customer_name || '',
      street1: pick('shipping_address1'),
      street2: pick('shipping_address2'),
      city: pick('shipping_city'),
      state: pick('shipping_province'),
      postal_code: pick('shipping_zip'),
      country: pick('shipping_country') || 'US'
    };
    if(autoAddress.street1 || autoAddress.city) patch.shipping_address = autoAddress;
  }

  if(Object.keys(patch).length){
    for(const [field,value] of Object.entries(patch)) await updateTicketField(ticketId, field, value);
    renderTicketPanel(S.activeTicket); // rebuilds the panel; tkPartOptions div is fresh, so re-grab it
  }
  box = document.getElementById('tkPartOptions');
  if(!box) return;
  box.innerHTML = renderPartOptionsHtml(buildPartOptions(ctx), `selectTkPn_${ticketId.replace(/-/g,'_')}`);
  window[`selectTkPn_${ticketId.replace(/-/g,'_')}`] = (pn)=>{
    const pnInput = document.getElementById('tkPnInput');
    if(pnInput) pnInput.value = pn;
    updateTicketField(ticketId, 'pn', pn);
  };
}
window.lookupOrderForTicket = lookupOrderForTicket;

/* ============================================================
   NEW TICKET (modal, matches ERP modal style)
   ============================================================ */
function openNewTicket(){
  const ov = document.getElementById('modalOverlay');
  ov.classList.remove('hidden');
  ov.innerHTML = `
    <div class="modal">
      <div class="modal-title">New Ticket</div>
      <div class="form-group" style="margin-bottom:12px"><label class="form-label">Subject</label><input class="form-input" id="ntSubject" placeholder="Brief summary"></div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Customer Name</label><input class="form-input" id="ntName"></div>
        <div class="form-group"><label class="form-label">Customer Email</label><input class="form-input" id="ntEmail"></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Order Number</label><input class="form-input" id="ntOrder" onchange="lookupOrderForModal()"></div>
        <div class="form-group"><label class="form-label">Part Number</label><input class="form-input" id="ntPn"></div>
      </div>
      <div id="ntPartOptions" style="margin-bottom:10px"></div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Priority</label>
          <select class="form-input" id="ntPriority">${['low','medium','high','urgent'].map(s=>`<option value="${s}" ${s==='medium'?'selected':''}>${label(s)}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Source</label>
          <select class="form-input" id="ntSource">${['manual','website','email'].map(s=>`<option value="${s}">${label(s)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-group" style="margin-top:4px"><label class="form-label">Initial Message</label><textarea class="form-input" id="ntBody" rows="4" placeholder="What's going on?" style="resize:vertical"></textarea></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createTicket()">Create Ticket</button>
      </div>
    </div>
  `;
}
window.openNewTicket = openNewTicket;

function closeModal(){
  const ov = document.getElementById('modalOverlay');
  ov.classList.add('hidden');
  ov.innerHTML = '';
}
window.closeModal = closeModal;

async function createTicket(){
  const subject = document.getElementById('ntSubject').value.trim();
  if(!subject){ toast('Subject is required', true); return; }
  const payload = {
    subject,
    customer_name: document.getElementById('ntName').value.trim() || null,
    customer_email: document.getElementById('ntEmail').value.trim() || null,
    order_number: document.getElementById('ntOrder').value.trim() || null,
    pn: document.getElementById('ntPn').value.trim() || null,
    priority: document.getElementById('ntPriority').value,
    source: document.getElementById('ntSource').value,
    status: 'open'
  };
  try{
    const { data, error } = await sb.from('tickets').insert(payload).select().single();
    if(error) throw error;
    S.tickets.unshift(data);
    const body = document.getElementById('ntBody').value.trim();
    if(body){
      await sb.from('ticket_messages').insert({
        ticket_id: data.id, sender_type: 'staff', sender_name: S.user.email, body, is_internal_note: false
      });
    }
    closeModal();
    toast('Ticket #' + data.ticket_number + ' created');
    goPage('tickets');
    openTicket(data.id);
  }catch(e){
    toast('Failed to create ticket: ' + e.message, true);
  }
}
window.createTicket = createTicket;
