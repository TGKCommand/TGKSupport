<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGK Motorsport Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:transparent!important}
:root{
  --teal:#0d9488;--orange:#ea580c;
  --bg:#ffffff;--bg2:#f7f8fa;--bg3:#f0f2f5;
  --border:#e2e6eb;--text:#111827;--text2:#374151;--text3:#6b7280;
  --r:10px;
}
body{position:relative;width:100%;height:100%}
#bubble{
  position:absolute;bottom:8px;right:8px;width:48px;height:48px;border-radius:50%;
  background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);border:none;outline:none;z-index:9999;
  padding:0;line-height:0;transition:transform .15s;
  appearance:none;-webkit-appearance:none;-moz-appearance:none;
}
#bubble:focus{outline:none;box-shadow:0 1px 4px rgba(0,0,0,.2)}
#bubble svg{display:block;flex-shrink:0;width:20px;height:20px}
#bubble:hover{transform:scale(1.06)}
#panel{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:var(--bg);border-radius:var(--r);box-shadow:0 10px 40px rgba(0,0,0,.2);
  display:none;flex-direction:column;overflow:hidden;z-index:9999;border:1px solid var(--border);
}
#panel.open{display:flex}
#panelContent{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.chat-head{background:var(--teal);color:#fff;padding:14px 16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.chat-head span{cursor:pointer;font-size:16px;opacity:.85}
.chat-body{flex:1;min-height:0;overflow-y:auto;padding:14px;background:var(--bg2);display:flex;flex-direction:column;gap:8px}
.chat-foot{flex-shrink:0;padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--bg)}
.chat-input{flex:1;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:none}
.chat-send{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:0 14px;font-weight:700;cursor:pointer;font-size:13px}
.msg-bubble{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.4}
.msg-bubble.customer{align-self:flex-end;background:var(--teal);color:#fff}
.msg-bubble.staff{align-self:flex-start;background:#fff;color:var(--text);border:1px solid var(--border)}
.pre-chat{padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.pre-chat input,.pre-chat textarea{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.pre-chat textarea{resize:vertical}
.pre-chat button{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-size:13px}
.offline-box{padding:20px 16px;text-align:center}
.offline-box p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.offline-box a{display:inline-block;background:var(--orange);color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px}
.loading-box{padding:30px;text-align:center;color:var(--text3);font-size:13px}
.ended-box{padding:20px 16px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<button id="bubble" onclick="togglePanel()">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
  </svg>
</button>

<div id="panel">
  <div class="chat-head">
    <span id="chatHeadTitle">TGK Motorsport Live Chat</span>
    <span onclick="togglePanel()">✕</span>
  </div>
  <div id="panelContent"></div>
</div>

<script>
const SUPABASE_URL = "https://piamamighqiielfztgic.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpYW1hbWlnaHFpaWVsZnp0Z2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjkxMzUsImV4cCI6MjA5MzQ0NTEzNX0.YwLflTw6F4cRzmY78QoAY6Zud2IHGVP5xL_yvMFxheA";
const SUPPORT_PAGE_URL = "https://contact.tgkmotorsport.com";

let panelOpen = false;
let chatState = null; // null = not started, {ticket_id, session_token, ended}
let pollTimer = null;

const CHAT_STORAGE_KEY = 'tgk_chat_session';

function saveChatSession(state){
  try{ localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(state)); }catch(e){ /* storage may be blocked — chat still works, just won't persist */ }
}
function loadChatSession(){
  try{
    const raw = localStorage.getItem(CHAT_STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function clearChatSession(){
  try{ localStorage.removeItem(CHAT_STORAGE_KEY); }catch(e){ /* non-critical */ }
}

// On load, silently check for an existing session so reopening the widget
// (or navigating to a new page) resumes the same chat instead of starting
// a fresh one. Doesn't force the panel open — just gets it ready.
(function restoreSessionOnLoad(){
  const saved = loadChatSession();
  if(saved && saved.ticket_id && saved.session_token){
    chatState = saved;
  }
})();

function togglePanel(){
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('open', panelOpen);
  notifyParentSize();
  if(panelOpen){
    if(chatState){
      renderChatWindow();
      startPolling();
    } else {
      checkAvailabilityAndRender();
    }
  }
}

function notifyParentSize(){
  try{
    window.parent.postMessage({
      source: 'TGK_CHAT_WIDGET',
      type: 'RESIZE',
      collapsed: !panelOpen
    }, '*');
  }catch(e){ /* non-critical */ }
}

// Tell the parent our size immediately on load too, in case it starts collapsed
window.addEventListener('load', notifyParentSize);

async function checkAvailabilityAndRender(){
  const content = document.getElementById('panelContent');
  content.innerHTML = '<div class="loading-box">Checking availability...</div>';
  try{
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/check-chat-availability`, {
      headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY }
    });
    const result = await resp.json();
    if(result.available){
      renderPreChatForm();
    }else{
      renderOffline();
    }
  }catch(e){
    renderOffline();
  }
}

function renderOffline(){
  document.getElementById('panelContent').innerHTML = `
    <div class="offline-box">
      <p>We're not available for live chat right now, but we'd still love to help — submit a support ticket and our team will follow up by email.</p>
      <a href="${SUPPORT_PAGE_URL}" target="_blank">Go to Support Page</a>
    </div>
  `;
}

function renderPreChatForm(){
  document.getElementById('panelContent').innerHTML = `
    <div class="pre-chat">
      <input id="preChatName" placeholder="Your name">
      <input id="preChatEmail" type="email" placeholder="Your email">
      <textarea id="preChatMessage" rows="3" placeholder="What can we help with?"></textarea>
      <div id="preChatError" style="color:#dc2626;font-size:12px"></div>
      <button onclick="startChat()">Start Chat</button>
    </div>
  `;
}

async function startChat(){
  const name = document.getElementById('preChatName').value.trim();
  const email = document.getElementById('preChatEmail').value.trim();
  const message = document.getElementById('preChatMessage').value.trim();
  const errBox = document.getElementById('preChatError');
  if(!name || !email || !message){
    errBox.textContent = 'Please fill in all fields.';
    return;
  }
  errBox.textContent = '';
  try{
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/start-chat-session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ name, email, message })
    });
    const result = await resp.json();
    if(!resp.ok || result.error) throw new Error(result.error || 'Could not start chat');

    chatState = { ticket_id: result.ticket_id, session_token: result.session_token, ended: false };
    saveChatSession(chatState);
    renderChatWindow();
    startPolling();
  }catch(e){
    errBox.textContent = 'Something went wrong — please try again.';
  }
}

let pendingChatAttachments = [];

function renderChatWindow(){
  document.getElementById('panelContent').innerHTML = `
    <div class="chat-body" id="chatBody"></div>
    <div id="chatAttachPreview" style="padding:0 10px;display:flex;flex-wrap:wrap;gap:4px"></div>
    <div class="chat-foot">
      <label style="cursor:pointer;display:flex;align-items:center;padding:0 4px" title="Attach a photo">
        📎<input type="file" id="chatFileInput" accept="image/*,.pdf" style="display:none" onchange="handleChatFileSelect(this)">
      </label>
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg();}"></textarea>
      <button class="chat-send" onclick="sendChatMsg()">Send</button>
    </div>
  `;
}

async function handleChatFileSelect(input){
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  const preview = document.getElementById('chatAttachPreview');
  for(const file of files){
    const chipId = 'catt_' + Math.random().toString(36).slice(2);
    preview.insertAdjacentHTML('beforeend', `<span style="font-size:11px;background:var(--bg3);padding:3px 8px;border-radius:6px" id="${chipId}">Uploading...</span>`);
    try{
      const path = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const upResp = await fetch(`${SUPABASE_URL}/storage/v1/object/ticket-attachments/${path}`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'apikey': SUPABASE_ANON_KEY,
          'Content-Type': file.type || 'application/octet-stream'
        },
        body: file
      });
      if(!upResp.ok) throw new Error('Upload failed');
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/ticket-attachments/${path}`;
      pendingChatAttachments.push({ name: file.name, url: publicUrl });
      const chip = document.getElementById(chipId);
      if(chip) chip.outerHTML = `<span style="font-size:11px;background:var(--bg3);padding:3px 8px;border-radius:6px">📎 ${escapeHtml(file.name)} <span style="cursor:pointer;color:#dc2626" onclick="removePendingChatAttachment('${publicUrl}', this.parentElement)">✕</span></span>`;
    }catch(e){
      const chip = document.getElementById(chipId);
      if(chip) chip.outerHTML = `<span style="font-size:11px;color:#dc2626">Failed: ${escapeHtml(file.name)}</span>`;
    }
  }
  input.value = '';
}
window.handleChatFileSelect = handleChatFileSelect;

function removePendingChatAttachment(url, chipEl){
  pendingChatAttachments = pendingChatAttachments.filter(a=>a.url!==url);
  if(chipEl) chipEl.remove();
}
window.removePendingChatAttachment = removePendingChatAttachment;

function renderMessages(messages){
  const body = document.getElementById('chatBody');
  if(!body) return;
  body.innerHTML = messages.map(m => `
    <div class="msg-bubble ${m.sender_type==='customer'?'customer':'staff'}">
      ${m.body ? escapeHtml(m.body) : ''}
      ${(m.attachments||[]).map(a => {
        const isImg = /\.(png|jpe?g|gif|webp)$/i.test(a.url||a.name||'');
        return isImg
          ? `<div style="margin-top:6px"><a href="${a.url}" target="_blank"><img src="${a.url}" style="max-width:100%;border-radius:6px;display:block"></a></div>`
          : `<div style="margin-top:6px"><a href="${a.url}" target="_blank" style="color:inherit;text-decoration:underline;font-size:12px">📎 ${escapeHtml(a.name||'attachment')}</a></div>`;
      }).join('')}
    </div>
  `).join('');
  body.scrollTop = body.scrollHeight;
}

function renderEnded(){
  if(pollTimer) clearInterval(pollTimer);
  document.getElementById('panelContent').innerHTML = `
    <div class="ended-box">This chat has ended. Thanks for reaching out! If you need anything else, feel free to start a new chat.</div>
  `;
  chatState = null;
  clearChatSession();
}

async function sendChatMsg(){
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if((!message && !pendingChatAttachments.length) || !chatState) return;
  input.value = '';
  const attachments = pendingChatAttachments;
  pendingChatAttachments = [];
  const preview = document.getElementById('chatAttachPreview');
  if(preview) preview.innerHTML = '';
  try{
    await fetch(`${SUPABASE_URL}/functions/v1/send-chat-message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ ticket_id: chatState.ticket_id, session_token: chatState.session_token, message: message || '(attachment)', attachments })
    });
    pollMessages();
  }catch(e){ /* will retry on next poll */ }
}

async function pollMessages(){
  if(!chatState) return;
  try{
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/get-chat-messages?ticket_id=${chatState.ticket_id}&session_token=${chatState.session_token}`, {
      headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY }
    });
    const result = await resp.json();
    if(!result.ok) return;
    if(result.ended){ renderEnded(); return; }
    renderMessages(result.messages || []);
  }catch(e){ /* silent — will retry */ }
}

function startPolling(){
  pollMessages();
  pollTimer = setInterval(pollMessages, 3000);
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
